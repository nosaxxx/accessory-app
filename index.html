<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上慶配件接單系統 (多語測試版)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        .active-lang { border: 2px solid #2563eb; color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" v-cloak class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-32">
        
        <div class="bg-white p-3 flex justify-end gap-2 sticky top-0 z-20 shadow-sm">
            <button @click="lang = 'zh'" :class="{'active-lang': lang === 'zh'}" class="px-3 py-1 text-xs border rounded-full">繁中</button>
            <button @click="lang = 'en'" :class="{'active-lang': lang === 'en'}" class="px-3 py-1 text-xs border rounded-full">EN</button>
            <button @click="lang = 'vi'" :class="{'active-lang': lang === 'vi'}" class="px-3 py-1 text-xs border rounded-full">Tiếng Việt</button>
        </div>

        <div class="bg-blue-600 text-white p-6">
            <h1 class="text-2xl font-bold">{{ t.title }}</h1>
            <p class="text-blue-100 text-sm mt-1">{{ t.subtitle }}</p>
        </div>

        <div class="p-4 space-y-4">
            <div v-for="item in products" :key="item.id" class="flex items-center p-3 border rounded-xl bg-white shadow-sm hover:border-blue-300 transition">
                <div class="w-16 h-16 bg-gray-100 rounded-lg flex-shrink-0 flex items-center justify-center text-gray-400 text-[10px] text-center">
                    PHOTO
                </div>
                <div class="ml-4 flex-1">
                    <h3 class="font-bold text-gray-800 leading-tight">{{ item.name[lang] }}</h3>
                    <p class="text-[11px] text-gray-500 mt-1">{{ item.spec[lang] }}</p>
                    <p class="text-blue-600 font-bold mt-1 text-lg">${{ item.price }}</p>
                </div>
                <div class="flex items-center space-x-2">
                    <button @click="dec(item)" class="w-8 h-8 bg-gray-100 rounded-lg font-bold text-lg flex items-center justify-center">-</button>
                    <span class="w-6 text-center font-bold">{{ item.qty }}</span>
                    <button @click="inc(item)" class="w-8 h-8 bg-blue-600 text-white rounded-lg font-bold text-lg flex items-center justify-center">+</button>
                </div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="text-gray-600 font-medium">{{ t.items }}: {{ totalCount }}</span>
                <span class="text-2xl font-black text-red-600">{{ t.total }}: ${{ totalPrice }}</span>
            </div>
            <button @click="submitOrder" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold text-xl active:scale-95 transition shadow-lg">
                {{ t.submit }}
            </button>
        </div>
    </div>

    <script>
        const { createApp } = Vue
        createApp({
            data() {
                return {
                    lang: 'zh',
                    i18n: {
                        zh: { title: "上慶配件系統", subtitle: "菱形網製造與零售服務", submit: "確認下單 (Line)", total: "總計", items: "已選品項" },
                        en: { title: "Order System", subtitle: "Mesh Hardware Manufacturing", submit: "Place Order", total: "Total", items: "Selected" },
                        vi: { title: "Hệ thống đặt hàng", subtitle: "Sản xuất phụ kiện lưới thép", submit: "Xác nhận", total: "Tổng", items: "Đã chọn" }
                    },
                    products: [
                        { id: 1, price: 25, qty: 0, name: { zh: '2" 鍍鋅管蓋', en: '2" Galv. Cap', vi: 'Nắp ống mạ kẽm 2"' }, spec: { zh: '適用2吋立柱', en: 'For 2" posts', vi: 'Cho cột 2 inch' } },
                        { id: 2, price: 45, qty: 0, name: { zh: '中型張力器', en: 'Tensioner (M)', vi: 'Bộ tăng kẹp (M)' }, spec: { zh: '鍍鋅防鏽', en: 'Anti-rust galvanized', vi: 'Mạ kẽm chống rỉ' } },
                        { id: 3, price: 15, qty: 0, name: { zh: '固定夾', en: 'Fixed Clip', vi: 'Kẹp cố định' }, spec: { zh: '標準型', en: 'Standard type', vi: 'Loại tiêu chuẩn' } },
                        { id: 4, price: 70, qty: 0, name: { zh: '張力條', en: 'Tension Bar', vi: 'Thanh căng' }, spec: { zh: '1.2米長', en: '1.2m Length', vi: 'Chiều dài 1.2m' } },
                        { id: 5, price: 12, qty: 0, name: { zh: 'U型螺栓', en: 'U-Bolt', vi: 'Bu lông chữ U' }, spec: { zh: '含螺母', en: 'Nut included', vi: 'Bao gồm đai ốc' } }
                    ]
                }
            },
            computed: {
                t() { return this.i18n[this.lang] },
                totalPrice() { return this.products.reduce((s, i) => s + (i.price * i.qty), 0) },
                totalCount() { return this.products.reduce((s, i) => s + i.qty, 0) }
            },
            methods: {
                inc(item) { item.qty++ },
                dec(item) { if(item.qty > 0) item.qty-- },
                async submitOrder() {
                    const selected = this.products.filter(i => i.qty > 0);
                    if (selected.length === 0) return alert(this.lang === 'zh' ? "請選擇配件！" : "Please select items!");
                    
                    let orderText = selected.map(i => `${i.name[this.lang]} x ${i.qty}`).join('\n');
                    let msg = `【${this.t.title}】\n---\n${orderText}\n---\n${this.t.total}: $${this.totalPrice}`;
                    
                    // 如果你有設定 GAS，可以在這裡加上 fetch 送到 Google 試算表
                    // console.log("發送到試算表...");

                    // 開啟 Line
                    window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
